<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Checklist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Cormorant+Garamond:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17cf91",
                        "background-light": "#F9F8F6",
                        "background-dark": "#11211c",
                        "surface": "#FFFFFF",
                        "text-main": "#1A1D1A",
                        "muted": "#8D978F",
                        "border-thin": "#E5E4E2"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Cormorant Garamond", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F8F6;
            color: #1A1D1A;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-heading {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
        }

        .custom-checkbox input:checked + div {
            background-color: #17cf91;
            border-color: #17cf91;
        }
        
        .custom-checkbox input:checked + div svg {
            display: block;
        }
        
        .checklist-item:has(input:checked) .item-text {
            color: #8D978F;
            text-decoration: line-through;
            transition: all 300ms ease;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background-light min-h-screen flex flex-col antialiased">
<!-- Header -->
<header class="sticky top-0 z-20 bg-background-light/95 backdrop-blur-sm pt-12 pb-4 px-6">
<div class="flex items-center justify-between mb-2">
<button class="flex items-center text-text-main h-10 w-10 -ml-2 rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="w-10"></div>
</div>
<h1 class="font-heading text-[36px] text-text-main leading-tight tracking-tight">Kyoto</h1>
<p class="text-muted text-[14px] font-normal tracking-wide mt-1">OCT 12 - 24</p>
</header>
<main class="flex-1">
<!-- Hero Image Area -->
<div class="px-6 mb-6">
<div class="w-full h-32 rounded-lg overflow-hidden relative">
<img alt="Kyoto landscape" class="w-full h-full object-cover object-[center_70%] opacity-80 grayscale-[0.2] contrast-[0.9]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfTWWPe1WATEsIbvMuNLrp6c4N-nbrkTxiDbDRnCedxV4mmA5PhB9-bwy2hDBUeDzvn42ldfdTfNvyLK4hT_EkcPCyr-NpmI_GQVI2ZYeGEkDfPG3rt7nHPTVhxS5poqDewCGM4hPiJpdZeqcW6AXaEPMoeY_HZyYbg5yDf_fgHapkjR5N_3Le2rGY8M7J-vIutgM2uiYzUSoNDZTz7iXXWnbd_hNi4blPtiKVRY6fWOE1frNDSEKr8K2ssbHIcAKpTwIx6ApuyEs"/>
<div class="absolute inset-0 bg-black/5"></div>
</div>
</div>
<!-- Weather Summary Widget -->
<div class="px-6 mb-8">
<a class="flex items-center justify-between p-4 bg-surface border border-border-thin rounded-xl hover:border-primary/30 transition-all group" href="#">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-[28px]">rainy</span>
</div>
<div>
<div class="text-[15px] font-medium text-text-main">12°C - 18°C</div>
<div class="text-[13px] text-muted font-light">Rain expected this week</div>
</div>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-text-main transition-colors">chevron_right</span>
</a>
</div>
<!-- Category Navigation -->
<div class="sticky top-[156px] z-10 bg-background-light border-b border-border-thin">
<nav class="flex overflow-x-auto hide-scrollbar px-6 h-12">
<button class="whitespace-nowrap px-1 py-3 text-[14px] text-text-main font-semibold border-b-2 border-text-main mr-8 uppercase tracking-widest">
                Clothing
            </button>
<button class="whitespace-nowrap px-1 py-3 text-[14px] text-muted font-normal hover:text-text-main transition-colors mr-8 uppercase tracking-widest">
                Toiletries
            </button>
<button class="whitespace-nowrap px-1 py-3 text-[14px] text-muted font-normal hover:text-text-main transition-colors mr-8 uppercase tracking-widest">
                Tech
            </button>
<button class="whitespace-nowrap px-1 py-3 text-[14px] text-muted font-normal hover:text-text-main transition-colors pr-6 uppercase tracking-widest">
                Essentials
            </button>
</nav>
</div>
<!-- Checklist Content -->
<div class="px-6 py-4 pb-24">
<div class="space-y-0">
<!-- Item 1 -->
<label class="checklist-item flex items-center justify-between h-16 border-b border-border-thin cursor-pointer group">
<div class="flex items-center gap-4 flex-1">
<div class="custom-checkbox relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-border-thin bg-surface flex items-center justify-center transition-colors duration-200">
<svg class="hidden w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<span class="item-text text-[15px] text-text-main font-light transition-all duration-300">Merino Wool Sweaters</span>
</div>
<span class="text-[12px] text-muted font-normal tracking-wider">x2</span>
</label>
<!-- Item 2 -->
<label class="checklist-item flex items-center justify-between h-16 border-b border-border-thin cursor-pointer group">
<div class="flex items-center gap-4 flex-1">
<div class="custom-checkbox relative flex items-center justify-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-border-thin bg-surface flex items-center justify-center transition-colors duration-200">
<svg class="hidden w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<span class="item-text text-[15px] text-text-main font-light transition-all duration-300">Lightweight Rain Jacket</span>
</div>
<span class="text-[12px] text-muted font-normal tracking-wider">x1</span>
</label>
<!-- Item 3 -->
<label class="checklist-item flex items-center justify-between h-16 border-b border-border-thin cursor-pointer group">
<div class="flex items-center gap-4 flex-1">
<div class="custom-checkbox relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-border-thin bg-surface flex items-center justify-center transition-colors duration-200">
<svg class="hidden w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<span class="item-text text-[15px] text-text-main font-light transition-all duration-300">Comfortable Walking Shoes</span>
</div>
<span class="text-[12px] text-muted font-normal tracking-wider">x1</span>
</label>
<!-- Item 4 -->
<label class="checklist-item flex items-center justify-between h-16 border-b border-border-thin cursor-pointer group">
<div class="flex items-center gap-4 flex-1">
<div class="custom-checkbox relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-border-thin bg-surface flex items-center justify-center transition-colors duration-200">
<svg class="hidden w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<div class="flex flex-col">
<span class="item-text text-[15px] text-text-main font-light transition-all duration-300">Evening Trousers</span>
<span class="text-[12px] text-muted font-light mt-0.5">Navy linen</span>
</div>
</div>
<span class="text-[12px] text-muted font-normal tracking-wider">x2</span>
</label>
<!-- Item 5 -->
<label class="checklist-item flex items-center justify-between h-16 border-b border-border-thin cursor-pointer group">
<div class="flex items-center gap-4 flex-1">
<div class="custom-checkbox relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-border-thin bg-surface flex items-center justify-center transition-colors duration-200">
<svg class="hidden w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<span class="item-text text-[15px] text-text-main font-light transition-all duration-300">Undergarments</span>
</div>
<span class="text-[12px] text-muted font-normal tracking-wider">x8</span>
</label>
</div>
<button class="mt-10 flex items-center gap-3 text-[13px] text-muted hover:text-text-main uppercase tracking-[0.15em] transition-colors font-medium">
<span class="material-symbols-outlined text-[20px]">add</span>
            Add Custom Item
        </button>
</div>
</main>
</body></html>
